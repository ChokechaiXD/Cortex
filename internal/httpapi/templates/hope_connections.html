{{define "hope_connections"}}
<section class="connection-list">
{{range .Connections}}
  <article class="hope-card">
    <div><p class="eyebrow">CONNECTION</p><h2>{{.Name}}</h2><p><span class="state-dot state-{{.State}}"></span>{{.StateLabel}}</p><small>{{.Detail}}</small></div>
    <form method="post" action="/ui/hope/integrations/{{.ID}}">
      <input type="hidden" name="csrf" value="{{$.CSRFToken}}">
      {{if .CanStart}}<button name="action" value="start">Start</button>{{end}}
      {{if .CanStop}}<button class="danger" name="action" value="stop">Stop HOPE process</button>{{end}}
      {{if .URL}}<button class="quiet" name="action" value="open">Open</button>{{end}}
    </form>
  </article>
{{end}}
</section>
<p class="safety-note">HOPE ตรวจสถานะ เปิด service จากคำสั่งที่ตั้งไว้ และไม่ปิด process ภายนอกที่ไม่ได้เปิดเอง</p>
{{end}}
