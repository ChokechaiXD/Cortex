{{define "hope_connections"}}
<section class="connection-list">
{{range .Connections}}
  <article class="hope-card connection-card">
    <div>
      <p class="eyebrow">SERVICE</p>
      <h2>{{.Name}}</h2>
      <p><span class="state-dot state-{{.State}}"></span>{{.StateLabel}}</p>
      <small>{{.Detail}}</small>
    </div>
    <form method="post" action="/ui/hope/integrations/{{.ID}}" class="card-actions">
      <input type="hidden" name="csrf" value="{{$.CSRFToken}}">
      {{if .CanStart}}<button name="action" value="start">Start</button>{{end}}
      {{if .CanStop}}<button class="danger" name="action" value="stop">Stop</button>{{end}}
      {{if .URL}}<button class="quiet" name="action" value="open">Open</button>{{end}}
    </form>
  </article>
{{end}}
</section>
<p class="safety-note">HOPE เป็นปุ่มควบคุมกลางเท่านั้น: ตรวจพอร์ตเดิมก่อน start และไม่ปิด process ภายนอกที่ไม่ได้เปิดจาก HOPE</p>
{{end}}
